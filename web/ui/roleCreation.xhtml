<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:sp="http://sailpoint.com/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:c="http://java.sun.com/jstl/core"
	xmlns:a4j="http://richfaces.org/a4j"
	xmlns:t="http://myfaces.apache.org/tomahawk"
	xmlns:h="http://java.sun.com/jsf/html">

<head>
  <meta charset="utf-8" />
  <title>Home - Role Management</title>
</head>
<body>
  <ui:composition>
  <link rel="stylesheet" type="text/css" href="#{plugins.requestContextPath}/plugin/rolemanagement/ui/css/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <!-- div class="submenuContentBox"  ng-app="RoleApp" ng-controller="RoleController" ng-init="loadData()">-->
     

    <main class="main-content" >
    	<div class="sidebar" id="sidebar">
	    <div class="sidebar-header">
	      <i class="fa-solid fa-arrow-left" id="openCloseIcon" onclick="toggleSidebar()"></i>
	    </div>
	    <ul class="sidebar-menu">
        <li class="active"><a href="#"><i class="fas fa-home"></i><span>Home</span></a></li>
        <li><a href="#"><i class="fas fa-check-square"></i><span>Approvals</span></a></li>
        <li class="has-submenu">
          <a href="#" onclick="toggleSubmenu(this)">
            <i class="fas fa-key"></i><span>Manage Access</span><i class="fas fa-chevron-down submenu-arrow"></i>
          </a>
          <ul class="submenu">
            <li><a href="#">Add Access</a></li>
            <li><a href="#">Remove Access</a></li>
            <li><a href="#">Copy Access</a></li>
          </ul>
        </li>
        <li><a href="#"><i class="fas fa-tasks"></i><span>Access Reviews</span></a></li>
      </ul>
	  </div>
      <h2>Welcome to Role Creation</h2>
      <!-- plugin content -->
    </main>

    <script>
    function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    const icon = document.getElementById("openCloseIcon");
    const menu = sidebar.querySelector(".sidebar-menu");

    sidebar.classList.toggle("collapsed");

    // Toggle icon direction
    if (sidebar.classList.contains("collapsed")) {
      icon.classList.remove("fa-arrow-left");
      icon.classList.add("fa-arrow-right");
      menu.style.display = "none"; // hide menu
    } else {
      icon.classList.remove("fa-arrow-right");
      icon.classList.add("fa-arrow-left");
      menu.style.display = "block"; // show menu
    }
  }

    function toggleSubmenu(el) {
      el.parentElement.classList.toggle("open");
    }
  </script>



  <script src="#{plugins.requestContextPath}/plugin/rolemanagement/ui/js/angular/angular.js"></script>
  <script src="#{plugins.requestContextPath}/plugin/rolemanagement/ui/js/angular/angular-animate.js"></script>
  <script src="#{plugins.requestContextPath}/plugin/rolemanagement/ui/js/angular/angular-sanitize.js"></script>
  <script src="#{plugins.requestContextPath}/plugin/rolemanagement/ui/js/angular/angular-messages.js"></script>
  <script src="#{plugins.requestContextPath}/plugin/rolemanagement/ui/js/ui-bootstrap-tpls-2.5.0.js"></script>
  <script src="#{plugins.requestContextPath}/plugin/rolemanagement/ui/js/angular-pretty-xml.js"></script>
  <script src="#{plugins.requestContextPath}/plugin/rolemanagement/ui/js/roleManagement.js"></script>
  </ui:composition>
</body>	
</html>
